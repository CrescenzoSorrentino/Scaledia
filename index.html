<!-- SCRIPT DI TRADUZIONE DINAMICA -->
<!-- ============================== -->
<script>

// Variabili Globali

let translationsData = {}; // Oggetto che conterrà tutte le traduzioni
const translationFile = 'translations.json'; // Percorso del file JSON di traduzioni
const defaultLang = 'en'; // Lingua predefinita
const availableLanguages = ['en', 'it', 'es', 'zh']; // Lingue supportate (puoi modificarle)

// Caricamento File Traduzioni
fetch(translationFile)
  .then(response => {
    if (!response.ok) {
      throw new Error('Errore HTTP: ' + response.status);
    }
    return response.json();
  })
  .then(data => {
    translationsData = data;
    const savedLang = localStorage.getItem('preferredLang') || defaultLang;
    if (!availableLanguages.includes(savedLang)) {
      console.warn(`Lingua salvata "${savedLang}" non supportata. Imposto lingua di default.`);
      switchLanguage(defaultLang);
    } else {
      switchLanguage(savedLang);
    }
  })
  .catch(error => console.error('Errore durante il caricamento delle traduzioni:', error));

// Funzione per Cambiare Lingua
function switchLanguage(lang) {
  if (!translationsData[lang]) {
    console.error(`La lingua "${lang}" non esiste nel file di traduzioni.`);
    return;
  }

  document.querySelectorAll("[data-lang-key]").forEach(el => {
    const key = el.getAttribute("data-lang-key");
    if (translationsData[lang][key]) {
      if (el.tagName === "INPUT") {
        el.placeholder = translationsData[lang][key];
      } else if (el.getAttribute("data-lang-html") === "true") {
        el.innerHTML = translationsData[lang][key];
      } else {
        el.textContent = translationsData[lang][key];
      }
    } else {
      console.warn(`Chiave di traduzione mancante: "${key}" nella lingua "${lang}"`);
    }
  });

  localStorage.setItem('preferredLang', lang); // Salva la lingua selezionata
}

// Event Listener per Cambio Lingua
document.querySelectorAll(".language-option").forEach(option => {
  option.addEventListener("click", (e) => {
    e.preventDefault();
    const selectedLang = e.target.getAttribute("data-lang");
    if (!availableLanguages.includes(selectedLang)) {
      console.error(`Lingua selezionata "${selectedLang}" non supportata.`);
      return;
    }
    switchLanguage(selectedLang);
  });
});

</script>
